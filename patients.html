<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Patients | Kaushambi Eye Hospital</title>

<link rel="stylesheet" href="dashboard.css">
<link rel="stylesheet" href="patients.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="sidebar">

    <div class="logo">

        <img src="images/logo.png" alt="Logo">

        <h2>KEH Admin</h2>

    </div>

    <ul>

        <li>
            <a href="dashboard.html">
                <i class="fa-solid fa-house"></i>
                Dashboard
            </a>
        </li>

        <li>
            <a href="appointments.html">
                <i class="fa-solid fa-calendar-check"></i>
                Appointments
            </a>
        </li>

        <li class="active">
            <a href="patients.html">
                <i class="fa-solid fa-user-injured"></i>
                Patients
            </a>
        </li>

        <li>
            <a href="doctor.html">
                <i class="fa-solid fa-user-doctor"></i>
                Doctors
            </a>
        </li>

        <li>
            <a href="index.html">
                <i class="fa-solid fa-right-from-bracket"></i>
                Logout
            </a>
        </li>

    </ul>

</div>

<div class="main">

<!-- Header -->

<div class="page-header">

<div>

<h1>

<i class="fa-solid fa-hospital-user"></i>

Patients Management

</h1>

<p>

Manage All Hospital Patients

</p>

</div>

<div class="header-date">

<i class="fa-solid fa-calendar-days"></i>

<span id="todayDate"></span>

</div>

</div>

<!-- ================= Cards ================= -->

<div class="cards">

<div class="card">
<i class="fa-solid fa-users"></i>
<h2 id="totalPatients">0</h2>
<p>Total Patients</p>
</div>

<div class="card">
<i class="fa-solid fa-user-plus"></i>
<h2 id="todayPatients">0</h2>
<p>New Today</p>
</div>

<div class="card">
<i class="fa-solid fa-person"></i>
<h2 id="malePatients">0</h2>
<p>Male</p>
</div>

<div class="card">
<i class="fa-solid fa-person-dress"></i>
<h2 id="femalePatients">0</h2>
<p>Female</p>
</div>

</div>

<!-- ================= Top Controls ================= -->

<div class="top-controls">

<div class="search-box">

<i class="fa-solid fa-magnifying-glass"></i>

<input
type="text"
id="search"
placeholder="Search by Patient Name, Mobile, UHID...">

</div>

<div class="right-controls">

<button id="refreshBtn">

<i class="fa-solid fa-rotate-right"></i>

Refresh

</button>

<button id="addPatientBtn">

<i class="fa-solid fa-user-plus"></i>

Add Patient

</button>

</div>

</div>

<!-- ================= Patients Table ================= -->

<div class="table-container">

<table>

<thead>

<tr>

<th>ID</th>
<th>UHID</th>
<th>Name</th>
<th>Age</th>
<th>Gender</th>
<th>Mobile</th>
<th>Doctor</th>
<th>Visit Date</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="patientTable">

</tbody>

</table>

</div>

<!-- ================= Add Patient Modal ================= -->

<div id="patientModal" class="modal">

    <div class="modal-content">

        <span class="close" onclick="closePatientModal()">&times;</span>

        <h2>Add New Patient</h2>

        <form id="patientForm">

            <div class="form-group">

                <label>Patient Name</label>

                <input
                    type="text"
                    id="patientName"
                    required>

            </div>

            <div class="form-group">

                <label>Mobile Number</label>

                <input
                    type="tel"
                    id="patientMobile"
                    required>

            </div>

            <div class="form-group">

                <label>Email</label>

                <input
                    type="email"
                    id="patientEmail">

            </div>

            <div class="form-group">

                <label>Age</label>

                <input
                    type="number"
                    id="patientAge"
                    required>

            </div>

            <div class="form-group">

                <label>Gender</label>

                <select id="patientGender" required>

                    <option value="">Select Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>

                </select>

            </div>

            <div class="form-group">

                <label>Doctor</label>

                <input
                    type="text"
                    id="patientDoctor"
                    placeholder="Doctor Name">

            </div>

            <div class="form-group">

                <label>Visit Date</label>

                <input
                    type="date"
                    id="visitDate">

            </div>

            <div class="form-group">

                <label>Address</label>

                <textarea
                    id="patientAddress"
                    rows="3"
                    placeholder="Patient Address"></textarea>

            </div>

            <button type="submit" class="save-btn">

                <i class="fa-solid fa-floppy-disk"></i>

                Save Patient

            </button>

        </form>

    </div>

</div>

<!-- ================= JavaScript ================= -->

<script type="module" src="patients.js"></script>

<script>

// Today's Date
document.getElementById("todayDate").innerHTML =
new Date().toLocaleDateString("en-GB",{
    day:"2-digit",
    month:"long",
    year:"numeric"
});

// Refresh
document.getElementById("refreshBtn").onclick=function(){

    location.reload();

};

// Open Modal
document.getElementById("addPatientBtn").onclick=function(){

    document.getElementById("patientModal").style.display="flex";

};

// Close Modal
function closePatientModal(){

    document.getElementById("patientModal").style.display="none";

}

// Close Modal when clicking outside
window.onclick=function(e){

    if(e.target==document.getElementById("patientModal")){

        closePatientModal();

    }

};

</script>

</div>

</body>
</html>
